apiVersion: apps/v1
kind: Deployment
metadata: 
    labels:
        name: "NodeJS_app"
    name: "NodeJS_app"
spec:

    replicas: 2
    selector:
        matchLabels:
            name: "NodeJS_app"
    template:
        metadata:
            labels:
                name: "NodeJS_app"
        spec:
            imagePullSecrets:
            -   name: "cred-secret"
            containers:
            -   name: " NodeJS" 
                image: "c505304/learning:20"
                imagePullPolicy: Always
                ports: 
                -   name: "api-web"
                    containerPort: 3000
                    
---
apiVersion: v1
kind: Service
metadata:
    name: Node-svc
spec: 
    type: ClusterIP
    selector:
        name: "NodeJS_app"
    ports:
    -   protocol: TCP
        port: 3000
        targetPort: "api-web"

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nodejs-ingress
  annotations:
      kubernetes.io/ingress.class: "nginx" 
spec:
  rules:         
  - http:
      paths:
      - path: /                     
        pathType: Prefix
        backend:
          service:
            name: Node-svc      
            port:
              number: 3000
